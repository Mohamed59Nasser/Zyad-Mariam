<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyad & Mariam - Wedding Invitation</title>
    <!-- استدعاء خطوط أنيقة من جوجل -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* ستايل القلوب الصغيرة (علامة مائية) */
.watermark-layer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none; opacity: 0.3;
}

/* ستايل القلب الكبير اللي هيضم الأسماء */
.big-heart-frame {
    border: 2px solid var(--accent-color);
    border-radius: 50% 50% 0 0 / 45% 45% 0 0;
    width: 320px;
    height: 380px;
    margin: 20px auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 2;
}
        /* إعدادات الألوان (أبيض، بيج، وأوف وايت) */
        :root {
            --bg-color: #FAF9F6; /* أوف وايت للخلفية */
            --white: #FFFFFF;    /* أبيض ناصع */
            --text-color: #4A4A4A; /* رمادي غامق جداً للقراءة */
            --accent-color: #C3B091; /* بيج أنيق */
            --dark-accent: #8E7C5E; /* بيج غامق للتباين */
            --rose-gold: #E6D7C3;   /* لون الورد المبهج */
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            scroll-behavior: smooth;
        }

        /* تنسيق باقات الورد الكبيرة والظاهرة */
        .wreath-container {
            width: 100%;
            max-width: 280px;
            margin: 0 auto 15px auto;
            position: relative;
            z-index: 2;
        }

        .corner-flowers {
            position: absolute;
            width: 150px;
            height: 150px;
            z-index: 1;
            pointer-events: none;
        }
        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; transform: scaleX(-1); }
        .bottom-left { bottom: 0; left: 0; transform: scaleY(-1); }
        .bottom-right { bottom: 0; right: 0; transform: scale(-1); }

        /* القسم الأول: الأسماء */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, var(--white), var(--bg-color));
            padding: 20px;
            position: relative;
            animation: fadeIn 2s ease-in; /* حركة ظهور ناعمة */
        }

        .intro-text {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.9rem;
            color: var(--dark-accent);
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        .names {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            color: var(--text-color);
            line-height: 1.2;
            margin: 10px 0;
            position: relative;
            z-index: 2;
        }

        .and {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3rem;
            color: var(--accent-color);
            margin: 10px 0;
            position: relative;
            z-index: 2;
        }

        .divider {
            width: 60px;
            height: 2px;
            background-color: var(--accent-color);
            margin: 30px auto;
            position: relative;
            z-index: 2;
        }

        /* القسم الثاني: التاريخ والعداد */
        .details-section {
            padding: 80px 20px;
            background-color: var(--white);
            position: relative;
        }

        .date {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .time-box {
            background-color: var(--bg-color);
            padding: 20px;
            border-radius: 8px;
            min-width: 90px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(195, 176, 145, 0.2);
        }

        .number {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--dark-accent);
            display: block;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-color);
            margin-top: 5px;
            display: block;
        }

        /* القسم الثالث: المكان وزر الخريطة */
        .location-section {
            padding: 80px 20px;
            background-color: var(--bg-color);
            position: relative;
        }

        .venue {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        .map-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 16px 45px;
            background-color: var(--accent-color);
            color: var(--white);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            border-radius: 30px; /* زرار بحواف دائرية أنيقة */
            transition: background 0.3s, transform 0.3s;
            box-shadow: 0 4px 15px rgba(195, 176, 145, 0.4);
            position: relative;
            z-index: 2;
        }

        .map-btn:hover {
            background-color: var(--dark-accent);
            transform: translateY(-3px); /* حركة خفيفة عند الوقوف على الزر */
        }

        footer {
            padding: 30px;
            background-color: var(--white);
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--dark-accent);
            position: relative;
            z-index: 2;
        }

        /* تأثير الظهور */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* توافق الموبايل */
        @media (max-width: 600px) {
            .names { font-size: 3rem; }
            .countdown-container { gap: 10px; }
            .time-box { padding: 15px; min-width: 70px; }
            .number { font-size: 2rem; }
            .label { font-size: 0.7rem; }
            .corner-flowers { width: 90px; height: 90px; }
            .wreath-container { max-width: 200px; }
        }
    </style>
</head>
<body>
    <svg class="watermark-layer" viewBox="0 0 100 100" preserveAspectRatio="none">
    <text x="10" y="10" font-size="5" fill="var(--accent-color)">♥</text>
    <text x="90" y="20" font-size="5" fill="var(--accent-color)">♥</text>
    <text x="20" y="50" font-size="4" fill="var(--accent-color)">♥</text>
    <text x="80" y="80" font-size="5" fill="var(--accent-color)">♥</text>
</svg>

    <!-- الافتتاحية -->
    <section class="hero">
        <!-- ورد الأركان العلوي الظاهر والملون -->
        <svg class="corner-flowers top-left" viewBox="0 0 100 100" fill="none">
            <path d="M0,0 Q30,10 40,40 T80,80" stroke="var(--dark-accent)" stroke-width="2"/>
            <circle cx="20" cy="20" r="12" fill="var(--accent-color)" />
            <circle cx="35" cy="15" r="8" fill="var(--rose-gold)" />
            <circle cx="15" cy="35" r="8" fill="var(--rose-gold)" />
            <path d="M5,45 Q20,35 40,50" stroke="var(--dark-accent)" stroke-width="1.5"/>
            <path d="M45,5 Q35,20 50,40" stroke="var(--dark-accent)" stroke-width="1.5"/>
        </svg>
        <svg class="corner-flowers top-right" viewBox="0 0 100 100" fill="none">
            <path d="M0,0 Q30,10 40,40 T80,80" stroke="var(--dark-accent)" stroke-width="2"/>
            <circle cx="20" cy="20" r="12" fill="var(--accent-color)" />
            <circle cx="35" cy="15" r="8" fill="var(--rose-gold)" />
            <circle cx="15" cy="35" r="8" fill="var(--rose-gold)" />
        </svg>

        <!-- باقة ورد مركزية كبيرة فوق الأسماء تعبر عن الفرحة بجد -->
        <div class="wreath-container">
            <svg viewBox="0 0 200 100" fill="none">
                <!-- الوردة الكبيرة في النص -->
                <circle cx="100" cy="50" r="22" fill="var(--accent-color)"/>
                <circle cx="100" cy="50" r="14" fill="var(--rose-gold)"/>
                <circle cx="100" cy="50" r="6" fill="var(--dark-accent)"/>
                <!-- الورد الجانبي -->
                <circle cx="65" cy="55" r="14" fill="var(--rose-gold)"/>
                <circle cx="65" cy="55" r="6" fill="var(--dark-accent)"/>
                <circle cx="135" cy="55" r="14" fill="var(--rose-gold)"/>
                <circle cx="135" cy="55" r="6" fill="var(--dark-accent)"/>
                <!-- أوراق الشجر والزينة الخضراء/الذهبية -->
                <path d="M45,60 Q30,50 15,55 Q30,65 45,60 Z" fill="var(--dark-accent)"/>
                <path d="M155,60 Q170,50 185,55 Q170,65 155,60 Z" fill="var(--dark-accent)"/>
                <path d="M100,20 Q110,5 120,20 Q110,30 100,20 Z" fill="var(--accent-color)"/>
                <path d="M100,20 Q90,5 80,20 Q90,30 100,20 Z" fill="var(--accent-color)"/>
            </svg>
        </div>

        <div class="intro-text">We are getting married</div>
        <div class="names">Zyad Nasser</div>
        <div class="and">&</div>
        <div class="names">Mariam Sherif</div>
        <div class="divider"></div>
        <p style="letter-spacing: 3px; font-weight: 300;">10 . 07 . 2026</p>
    </section>

    <!-- التفاصيل والعداد التنازلي -->
    <section class="details-section">
        <!-- باقة ورد رقيقة للفصل بين الأقسام -->
        <div style="max-width: 120px; margin: 0 auto 15px auto;">
            <svg viewBox="0 0 100 40" fill="none">
                <circle cx="50" cy="20" r="10" fill="var(--accent-color)"/>
                <circle cx="35" cy="22" r="7" fill="var(--rose-gold)"/>
                <circle cx="65" cy="22" r="7" fill="var(--rose-gold)"/>
            </svg>
        </div>

        <h2 class="date">Save The Date</h2>
        <p style="letter-spacing: 2px; color: #8E7C5E; font-weight: 500;">FRIDAY, JULY 10, 2026 AT 8:00 PM</p>
        
        <div class="countdown-container">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs</span>
            </div>
        </div>
    </section>

    <!-- المكان وزر الخريطة -->
    <section class="location-section">
        <!-- ورد الأركان السفلي عشان يقفل التصميم بشياكة -->
        <svg class="corner-flowers bottom-left" viewBox="0 0 100 100" fill="none">
            <path d="M0,0 Q30,10 40,40 T80,80" stroke="var(--dark-accent)" stroke-width="2"/>
            <circle cx="20" cy="20" r="12" fill="var(--accent-color)" />
            <circle cx="35" cy="15" r="8" fill="var(--rose-gold)" />
            <circle cx="15" cy="35" r="8" fill="var(--rose-gold)" />
        </svg>
        <svg class="corner-flowers bottom-right" viewBox="0 0 100 100" fill="none">
            <path d="M0,0 Q30,10 40,40 T80,80" stroke="var(--dark-accent)" stroke-width="2"/>
            <circle cx="20" cy="20" r="12" fill="var(--accent-color)" />
            <circle cx="35" cy="15" r="8" fill="var(--rose-gold)" />
            <circle cx="15" cy="35" r="8" fill="var(--rose-gold)" />
        </svg>

        <div class="intro-text">Join Us At</div>
        <h2 class="venue">Golden Plaza</h2>
        <p>We can't wait to celebrate with you!</p>
        <a href="https://maps.app.goo.gl/AMYfMQbmzNiTB344A?g_st=ac" target="_blank" class="map-btn">
            Open in Google Maps
        </a>
    </section>

    <footer>
        Zyad & Mariam © 2026
    </footer>

    <!-- سكربت برمجة العداد -->
    <script>
        // تاريخ الفرح المظبوط تماماً الساعة 8 مساءً (20:00:00)
        const weddingDate = new Date("July 10, 2026 20:00:00").getTime();
        
        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            
            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
