<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyad & Mariam | Wedding Invitation</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FCFBF9;     
            --text-main: #3E3B38;    
            --accent-color: #D3C5B0; /* Matte Gold */
            --rose-color: #C98B8B;   /* Rose Gold */
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

        /* --- Preloader --- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .preloader-content {
            opacity: 0;
            transform: scale(0.95);
            animation: pulseIntro 2.4s forwards ease-in-out;
        }

        .preloader-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-style: italic;
            font-weight: 500;
            color: var(--rose-color);
        }

        @keyframes pulseIntro {
            0% { opacity: 0; transform: scale(0.95); }
            30% { opacity: 1; transform: scale(1); }
            75% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.02); }
        }

        #preloader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        #main-content {
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            position: relative;
            width: 100%;
        }
        #main-content.visible { opacity: 1; }

        /* --- Corner Vine SVGs --- */
        .corner-svg {
            position: absolute;
            width: 280px;
            height: 280px;
            pointer-events: none;
            z-index: 10;
            overflow: visible;
        }

        /* Positioning */
        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; transform: scaleX(-1); }
        .bottom-left { bottom: 0; left: 0; transform: scaleY(-1); }
        .bottom-right { bottom: 0; right: 0; transform: scale(-1); }

        /* --- Floating Elements --- */
        .floating-element {
            position: fixed;
            bottom: -60px;
            z-index: 2; 
            pointer-events: none;
            animation: floatUp linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.6) rotate(0deg); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { transform: translateY(-115vh) scale(1.1) rotate(30deg); opacity: 0; }
        }

        /* --- Main Layout --- */
        .vintage-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            position: relative;
            z-index: 5;
        }

        .header-heart { width: 45px; height: 45px; }

        .vintage-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 300;
            color: #555555;
            letter-spacing: 1px;
        }

        .serif-italic {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            position: relative;
            z-index: 5;
        }

        .pre-title {
            font-size: 0.85rem;
            letter-spacing: 7px;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 25px;
            font-weight: 400;
        }

        .names-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .name-row {
            font-size: 4.5rem;
            color: var(--text-main);
            white-space: nowrap; 
            line-height: 1.1;
        }

        .ampersand {
            font-size: 3.2rem;
            color: var(--accent-color);
            line-height: 1;
        }

        .section {
            padding: 90px 20px;
            max-width: 650px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.8rem;
            color: var(--text-main);
            margin-bottom: 35px;
        }

        .venue-text-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 300;
            line-height: 1.6;
            color: #666;
            max-width: 500px;
            margin: 0 auto 30px auto;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 20px 0;
        }

        .countdown-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 75px;
        }

        .time-num {
            font-size: 3rem;
            font-weight: 300;
            line-height: 1;
            margin-bottom: 6px;
        }

        .time-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        .btn-capsule {
            display: inline-block;
            padding: 16px 45px;
            background-color: var(--accent-color);
            color: #FFFFFF;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 50px;
            border: 1px solid var(--accent-color);
            transition: all 0.35s ease;
            box-shadow: 0 5px 15px rgba(211, 197, 176, 0.3);
        }

        .btn-capsule:hover {
            background-color: transparent;
            color: var(--accent-color);
            box-shadow: none;
        }

        footer {
            padding: 100px 20px 80px 20px;
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: #A09E9A;
            text-transform: uppercase;
            position: relative;
            z-index: 5;
        }

        @media (max-width: 768px) {
            .preloader-title { font-size: 7.5vw; }
            .vintage-title { font-size: 1.4rem; }
            .name-row { font-size: 10vw; } 
            .ampersand { font-size: 8vw; }
            .section-title { font-size: 2.2rem; }
            .countdown-container { gap: 12px; }
            .time-num { font-size: 2.2rem; }
            .corner-svg { width: 160px; height: 160px; } 
        }
    </style>
</head>
