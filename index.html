<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyad & Mariam | Wedding Invitation</title>
    
    <!-- Google Fonts: Pinyon Script للفخامة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FDFDFB;       
            --text-main: #4A4441;      
            --rose-pink: #EAA4A4;      
            --rose-dark: #C97A7A;      
            --sage-green: #8FA89B;     
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        .pinyon { font-family: 'Pinyon Script', cursive; }

        /* --- Layout --- */
        #main-content {
            padding: 100px 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .names-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            margin: 40px 0;
        }

        .name-row {
            font-size: 5rem;
            line-height: 1;
            color: var(--text-main);
        }

        .ampersand {
            font-size: 3.5rem;
            color: var(--rose-pink);
            margin: 10px 0;
        }

        .section-title {
            font-size: 4rem;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .btn-capsule {
            display: inline-block;
            padding: 12px 40px;
            background-color: var(--sage-green);
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.7rem;
            border-radius: 50px;
            margin-top: 30px;
        }

        /* --- Floating Elements --- */
        .floating-element {
            position: fixed;
            bottom: -100px;
            z-index: 9;
            pointer-events: none;
            animation: floatUp 8s linear forwards;
        }
        
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.4) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-110vh) scale(1) rotate(15deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <svg style="display: none;">
        <defs>
            <g id="watercolor-heart">
                <path d="M50,30 Q65,12 80,30 Q80,52 50,78 Q20,52 20,30 Q35,12 50,30 Z" fill="none" stroke="var(--rose-pink)" stroke-width="1.5"/>
            </g>
        </defs>
    </svg>

    <div id="main-content">
        <p style="letter-spacing: 8px; text-transform: uppercase; font-size: 0.7rem; color: #8A817C;">Save The Date</p>
        
        <div class="names-column">
            <h1 class="name-row pinyon">Zyad Nasser</h1>
            <span class="ampersand pinyon">&</span>
            <h1 class="name-row pinyon">Mariam Sherif</h1>
        </div>

        <h2 class="section-title pinyon">July 10, 2026</h2>
        
        <p style="line-height: 2; color: #615B57;">We joyfully request the honor of your presence<br>to celebrate the union of our hearts.</p>
        
        <a href="#" class="btn-capsule">View On Google Maps</a>
    </div>

    <script>
        function createFloatingParticle() {
            const particle = document.createElement('div');
            particle.classList.add('floating-element');
            particle.style.left = Math.random() * 90 + 'vw';
            
            // قلووب بالحروف بالفونت الجديد
            particle.innerHTML = `
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <use href="#watercolor-heart"/>
                    <text x="50" y="60" font-family="'Pinyon Script', cursive" font-size="40" text-anchor="middle" fill="var(--rose-dark)">
                        ${Math.random() > 0.5 ? 'Z' : 'M'}
                    </text>
                </svg>
            `;
            document.body.appendChild(particle);
            setTimeout(() => { particle.remove(); }, 8000);
        }
        setInterval(createFloatingParticle, 600);
    </script>
</body>
</html>
