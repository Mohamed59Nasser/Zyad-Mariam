<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyad & Mariam | Wedding Invitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        /* الألوان المسحوبة من الصور اللي إنت بعتها */
        :root {
            --bg-color: #FCFBF9;     /* لون الخلفية الأوف وايت الرايق */
            --text-main: #4A4A4A;    /* لون الأسماء الرمادي الغامق */
            --accent-color: #BCA98F; /* لون الزرار والخطوط الصغيرة (البيج/الدهبي المطفي) */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* تنسيق الخطوط بناءً على الصور */
        h1, h2, h3, .names, .venue-name {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
        }

        /* --- أيقونة الوردة والقلب اللي فوق --- */
        .top-icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            margin-top: 40px;
        }

        .top-icon-container svg {
            width: 35px;
            height: 35px;
        }

        .vintage-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            color: var(--text-main);
            font-weight: 300;
        }

        /* --- القسم الأول --- */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }

        .pre-title {
            font-size: 0.85rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 30px;
            font-weight: 400;
        }

        .names-wrapper {
            margin: 10px 0 40px 0;
        }

        .name {
            font-size: 5.5rem;
            line-height: 1.1;
            color: var(--text-main);
        }

        .ampersand {
            font-size: 3.5rem;
            font-style: italic;
            color: var(--accent-color);
            margin: -5px 0;
            display: block;
        }

        /* --- الأقسام العامة --- */
        .section {
            padding: 80px 20px;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .section-title {
            font-size: 3.2rem;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .section-subtitle {
            font-size: 0.9rem;
            color: var(--text-main);
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* --- العداد التنازلي --- */
        .countdown-wrapper {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 40px;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px;
        }

        .count-num {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--text-main);
            line-height: 1;
            margin-bottom: 10px;
        }

        .count-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        /* --- قسم اللوكيشن --- */
        .venue-name {
            font-size: 3.5rem;
            color: var(--text-main);
            margin: 20px 0;
        }

        /* الزرار متصمم بالظبط زي الصورة اللي بعتها */
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 16px 45px;
            background-color: var(--accent-color);
            color: #FFFFFF;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 50px; /* بيخلي الزرار كبسولة زي الصورة */
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(188, 169, 143, 0.3);
            border: 1px solid var(--accent-color);
        }

        .btn:hover {
            background-color: transparent;
            color: var(--accent-color);
            box-shadow: none;
        }

        /* --- القلوب الطائرة (Z & M) --- */
        .floating-heart {
            position: fixed;
            bottom: -60px;
            z-index: 0;
            pointer-events: none;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.7); opacity: 0; }
            20% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-120vh) scale(1.1); opacity: 0; }
        }

        /* الفوتر */
        footer {
            padding: 40px 20px;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: #999;
            text-transform: uppercase;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        /* ريسبونسيف للموبايل */
        @media (max-width: 768px) {
            .name { font-size: 4rem; }
            .venue-name { font-size: 2.8rem; }
            .ampersand { font-size: 2.5rem; }
            .countdown-wrapper { gap: 15px; }
            .count-num { font-size: 2.2rem; }
            .top-icon-container { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        
        <div class="top-icon-container">
            <svg viewBox="0 0 100 100" fill="none" stroke="#E0D5C1" stroke-width="2">
                <path d="M50,85 C50,85 15,55 15,30 C15,15 30,5 45,15 C50,18 50,18 50,18 C50,18 50,18 55,15 C70,5 85,15 85,30 C85,55 50,85 50,85 Z" fill="#FCFBF9"/>
                <text x="50" y="45" font-family="'Playfair Display', serif" font-size="20" text-anchor="middle" fill="#E0D5C1">M</text>
            </svg>
            
            <span class="vintage-text">Vintage Rose</span>
            
            <svg viewBox="0 0 100 100" fill="none" stroke="#BCA98F" stroke-width="1.5">
                <path d="M50,20 C40,20 35,30 40,40 C30,35 20,40 25,50 C15,55 25,70 40,65 C35,75 45,85 55,80 C65,90 75,80 70,70 C85,75 90,60 80,50 C90,45 80,30 70,35 C75,25 65,15 50,20 Z"/>
                <path d="M40,40 C50,50 60,40 70,50 M30,55 C40,65 50,55 60,65 M45,75 C55,85 65,75 75,85"/>
            </svg>
        </div>

        <p class="pre-title">We are getting married</p>
        
        <div class="names-wrapper">
            <h1 class="name">Zyad Nasser</h1>
            <span class="ampersand">&</span>
            <h1 class="name">Mariam Sherif</h1>
        </div>
    </section>

    <section class="section">
        <p class="pre-title">Save The Date</p>
        <h2 class="section-title">July 10, 2026</h2>
        
        <div class="countdown-wrapper">
            <div class="countdown-item">
                <span class="count-num" id="days">00</span>
                <span class="count-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="count-num" id="hours">00</span>
                <span class="count-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="count-num" id="mins">00</span>
                <span class="count-label">Mins</span>
            </div>
            <div class="countdown-item">
                <span class="count-num" id="secs">00</span>
                <span class="count-label">Secs</span>
            </div>
        </div>
    </section>

    <section class="section">
        <p class="pre-title">Join Us At</p>
        <h2 class="venue-name">Golden Plaza</h2>
        <p class="section-subtitle">We can't wait to celebrate with you!</p>
        
        <a href="https://maps.app.goo.gl/AMYfMQbmzNiTB344A?g_st=ac" target="_blank" class="btn">Open In Google Maps</a>
    </section>

    <footer>
        <p>Zyad & Mariam © 2026</p>
    </footer>

    <script>
        // 1. برمجة العداد
        const weddingDate = new Date("July 10, 2026 20:00:00").getTime();

        const updateCountdown = setInterval(() => {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            if (distance < 0) {
                clearInterval(updateCountdown);
                return;
            }

            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("mins").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("secs").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);

        // 2. برمجة القلوب الطائرة اللي طلبتها
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            
            const leftPosition = Math.random() * 100;
            const animationDuration = Math.random() * 5 + 8;
            const heartSize = Math.random() * 15 + 20;
            
            const letters = ['Z', 'M'];
            const letter = letters[Math.floor(Math.random() * letters.length)];

            heart.style.left = leftPosition + 'vw';
            heart.style.animationDuration = animationDuration + 's';
            
            heart.innerHTML = `
                <svg viewBox="0 0 100 100" width="${heartSize}" height="${heartSize}">
                   <path d="M50,25 Q75,5 90,30 Q90,60 50,90 Q10,60 10,30 Q25,5 50,25 Z" fill="none" stroke="#BCA98F" stroke-width="2"/>
                   <text x="50" y="55" font-family="'Playfair Display', serif" font-size="22" text-anchor="middle" fill="#BCA98F" font-style="italic">${letter}</text>
                </svg>
            `;
            
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, animationDuration * 1000);
        }
        setInterval(createFloatingHeart, 1000);
    </script>
</body>
</html>
