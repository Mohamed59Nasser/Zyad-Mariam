<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyad & Mariam | Wedding Invitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Pinyon+Script&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FDFAF7;
            --text-main: #3D3633;
            --rose-pink: #E8A0A0;
            --rose-dark: #C47070;
            --rose-light: #FBE4E4;
            --rose-deep: #B05A5A;
            --sage-green: #7A9B8A;
            --olive-dark: #5E7A6A;
            --soft-tan: #D4C4B0;
            --gold: #C9A96A;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Cormorant Garamond', serif;
            text-align: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--rose-pink); border-radius: 3px; }

        .pinyon { font-family: 'Pinyon Script', cursive; font-weight: 400; }
        .cg { font-family: 'Cormorant Garamond', serif; }

        /* --- Preloader --- */
        #preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.2s ease-in-out, visibility 1.2s;
        }

        .preloader-content {
            opacity: 0;
            animation: fadeInScale 2.5s forwards ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .preloader-ornament {
            font-size: 1.2rem;
            color: var(--rose-pink);
            letter-spacing: 12px;
            opacity: 0.6;
        }

        .preloader-title {
            font-family: 'Pinyon Script', cursive;
            font-size: 5rem;
            color: var(--rose-dark);
            margin: 0;
            line-height: 1;
        }

        .preloader-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--sage-green);
            margin-top: 4px;
        }

        @keyframes fadeInScale {
            0%   { opacity: 0; transform: scale(0.92); }
            18%  { opacity: 1; transform: scale(1); }
            80%  { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.04); }
        }

        #preloader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* --- Main Content --- */
        #main-content {
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            position: relative;
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            background: var(--bg-color);
            min-height: 100vh;
        }
        #main-content.visible { opacity: 1; }

        /* --- Thin decorative border lines --- */
        .border-line {
            position: absolute;
            background: transparent;
            border: 1px solid rgba(196, 112, 112, 0.18);
            pointer-events: none;
            z-index: 9;
        }
        .border-outer {
            top: 18px; left: 18px;
            right: 18px; bottom: 18px;
            position: fixed;
            border: 1px solid rgba(196, 112, 112, 0.12);
        }
        .border-inner {
            top: 26px; left: 26px;
            right: 26px; bottom: 26px;
            position: fixed;
            border: 1px solid rgba(196, 112, 112, 0.08);
        }

        /* --- Floating Elements --- */
        .floating-element {
            position: fixed;
            bottom: -120px;
            z-index: 9;
            pointer-events: none;
            animation: floatUp linear forwards;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.04));
        }

        @keyframes floatUp {
            0%   { transform: translateY(0) scale(0.35) rotate(-12deg); opacity: 0; }
            8%   { opacity: 0.85; }
            88%  { opacity: 0.85; }
            100% { transform: translateY(-112vh) scale(1.1) rotate(18deg); opacity: 0; }
        }

        /* --- Layout --- */
        .content-wrapper {
            padding: 130px 50px 80px 50px;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .pre-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.7rem;
            letter-spacing: 7px;
            text-transform: uppercase;
            color: var(--olive-dark);
            margin-bottom: 18px;
            font-weight: 500;
            font-style: italic;
        }

        .ornament-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin: 16px 0;
            color: var(--rose-pink);
            opacity: 0.55;
            font-size: 0.7rem;
            letter-spacing: 10px;
        }

        .ornament-line::before,
        .ornament-line::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--rose-pink), transparent);
        }

        .names-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin: 24px 0;
        }

        .name-row {
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1;
            margin: 0;
        }

        .ampersand {
            font-family: 'Pinyon Script', cursive;
            font-size: 4.8rem;
            color: #C9A96A;
            line-height: 1;
            display: block;
            margin: 4px 0;
        }

        .section {
            padding: 50px 0;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        .section::before {
            content: '';
            display: block;
            width: 120px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(143,168,155,0.3), transparent);
            margin: 0 auto 50px auto;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 4.2rem;
            color: var(--text-main);
            margin-bottom: 12px;
            margin-top: 8px;
        }

        .venue-text-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.9;
            color: #6B6260;
            font-style: italic;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 28px 0;
        }

        .countdown-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 76px;
            padding: 14px 6px;
            border: 1px solid rgba(196,112,112,0.15);
            border-radius: 4px;
            background: rgba(251,228,228,0.12);
        }

        .time-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 300;
            line-height: 1;
            color: var(--rose-dark);
            margin-bottom: 6px;
        }

        .time-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--olive-dark);
        }

        .btn-capsule {
            display: inline-block;
            padding: 14px 44px;
            background-color: transparent;
            color: var(--olive-dark);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.65rem;
            font-weight: 500;
            border-radius: 50px;
            border: 1px solid var(--sage-green);
            transition: all 0.4s ease;
            margin-top: 28px;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-capsule:hover {
            background-color: var(--sage-green);
            color: #fff;
            box-shadow: 0 6px 20px rgba(122,155,138,0.25);
        }

        footer {
            padding: 40px 0 50px;
            position: relative;
            z-index: 5;
        }

        footer::before {
            content: '';
            display: block;
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--rose-pink), transparent);
            margin: 0 auto 28px auto;
        }

        @media (max-width: 768px) {
            .preloader-title   { font-size: 3.8rem; }
            .name-row          { font-size: 3.6rem; }
            .ampersand         { font-size: 2.8rem; }
            .section-title     { font-size: 3rem; }
            .countdown-box     { width: 62px; }
            .time-num          { font-size: 2.2rem; }
            .content-wrapper   { padding: 110px 22px 60px 22px; }
            .border-outer, .border-inner { display: none; }
        }
    </style>
</head>
