<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyad & Mariam - Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FAF9F6;
            --text-color: #4A4A4A;
            --accent-color: #C3B091;
            --watermark: rgba(195, 176, 145, 0.15);
        }

        body { margin: 0; background-color: var(--bg-color); font-family: 'Montserrat', sans-serif; text-align: center; color: var(--text-color); }

        .watermark-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.8;
        }

        .content { position: relative; z-index: 1; padding: 50px 20px; }

        .heart-container {
            position: relative; width: 300px; height: 350px; margin: 0 auto;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .heart-svg { position: absolute; width: 100%; height: 100%; z-index: -1; }

        .names { font-family: 'Playfair Display', serif; font-size: 3rem; margin: 10px 0; }
        .wreath { width: 100px; margin-bottom: 10px; }
        
        .section { margin-top: 80px; }
        .countdown { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .time-box { background: rgba(255,255,255,0.5); padding: 10px; border-radius: 10px; min-width: 60px; }
        
        .map-btn { display: inline-block; margin-top: 20px; padding: 15px 30px; background-color: var(--accent-color); color: #FFF; text-decoration: none; border-radius: 25px; }
    </style>
</head>
<body>

    <svg class="watermark-layer" viewBox="0 0 100 100" preserveAspectRatio="none">
        <text x="5" y="10" font-size="3" fill="var(--watermark)">Z</text>
        <text x="95" y="15" font-size="3" fill="var(--watermark)">M</text>
        <text x="15" y="40" font-size="3" fill="var(--watermark)">Z</text>
        <text x="85" y="50" font-size="3" fill="var(--watermark)">M</text>
        <text x="10" y="80" font-size="3" fill="var(--watermark)">Z</text>
        <text x="90" y="90" font-size="3" fill="var(--watermark)">M</text>
    </svg>

    <div class="content">
        <section class="heart-container">
            <svg class="heart-svg" viewBox="0 0 100 100" fill="none">
                <path d="M50,20 Q75,0 90,30 Q90,60 50,90 Q10,60 10,30 Q25,0 50,20 Z" 
                      stroke="var(--accent-color)" stroke-width="0.5" stroke-dasharray="2 2" />
            </svg>
            <svg class="wreath" viewBox="0 0 100 50">
                <circle cx="50" cy="25" r="10" fill="var(--accent-color)"/>
            </svg>
            <div>We are getting married</div>
            <div class="names">Zyad Nasser</div>
            <div>&</div>
            <div class="names">Mariam Sherif</div>
            <div style="margin-top: 10px;">10 . 07 . 2026</div>
        </section>

        <section class="section">
            <h2>Save The Date</h2>
            <div class="countdown" id="timer">
                <div class="time-box"><div id="days">00</div>Days</div>
                <div class="time-box"><div id="hours">00</div>Hrs</div>
                <div class="time-box"><div id="minutes">00</div>Mins</div>
                <div class="time-box"><div id="seconds">00</div>Secs</div>
            </div>
        </section>

        <section class="section">
            <h3>Golden Plaza</h3>
            <a href="https://maps.app.goo.gl/AMYfMQbmzNiTB344A?g_st=ac" target="_blank" class="map-btn">Open in Google Maps</a>
        </section>
    </div>

    <script>
        const weddingDate = new Date("July 10, 2026 20:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = weddingDate - now;
            document.getElementById("days").innerText = Math.floor(diff / (1000*60*60*24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000*60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
