<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyad & Mariam - Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات الألوان والخطوط */
        :root {
            --bg-offwhite: #FAF9F6;
            --bg-white: #FFFFFF;
            --text-main: #3E3B38;
            --accent-beige: #D4C4A8;
            --accent-dark-beige: #B8A484;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-offwhite);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1, h2, h3, .names {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
        }

        /* حاوية أساسية */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* القسم الأول: الافتتاحية */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hero::before, .hero::after {
            content: '';
            position: absolute;
            width: 1px;
            height: 80px;
            background-color: var(--accent-beige);
        }

        .hero::before { top: 10%; }
        .hero::after { bottom: 10%; }

        .pre-title {
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-dark-beige);
            margin-bottom: 20px;
        }

        .names {
            font-size: 3.5rem;
            line-height: 1.2;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        .ampersand {
            color: var(--accent-beige);
            font-size: 3rem;
            font-style: italic;
            display: block;
            margin: 10px 0;
        }

        /* قسم التفاصيل */
        .details-card {
            background-color: var(--bg-white);
            padding: 60px 40px;
            margin: 40px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(212, 196, 168, 0.3);
        }

        .date-title {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .date-text {
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--accent-dark-beige);
            margin-bottom: 40px;
        }

        /* العداد التنازلي */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 70px;
        }

        .time-box span.number {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--text-main);
        }

        .time-box span.label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-dark-beige);
            margin-top: 5px;
        }

        /* قسم المكان */
        .location {
            margin-top: 30px;
        }

        .location-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .btn-maps {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 35px;
            background-color: var(--accent-beige);
            color: var(--bg-white);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            border-radius: 2px;
            transition: all 0.3s ease;
            border: 1px solid var(--accent-beige);
        }

        .btn-maps:hover {
            background-color: transparent;
            color: var(--accent-dark-beige);
        }

        /* الفوتر */
        footer {
            padding: 40px 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--accent-dark-beige);
            text-transform: uppercase;
        }

        /* استجابة الموبايل */
        @media (max-width: 600px) {
            .names { font-size: 2.5rem; }
            .details-card { padding: 40px 20px; }
            .countdown { gap: 10px; }
            .time-box span.number { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero">
            <p class="pre-title">We are getting married</p>
            <h1 class="names">
                Zyad Nasser
                <span class="ampersand">&</span>
                Mariam Sherif
            </h1>
        </header>

        <section class="details-card">
            <h2 class="date-title">Save The Date</h2>
            <p class="date-text">JULY 10, 2026</p>

            <div class="countdown" id="countdown">
                <div class="time-box">
                    <span class="number" id="days">00</span>
                    <span class="label">Days</span>
                </div>
                <div class="time-box">
                    <span class="number" id="hours">00</span>
                    <span class="label">Hours</span>
                </div>
                <div class="time-box">
                    <span class="number" id="minutes">00</span>
                    <span class="label">Mins</span>
                </div>
                <div class="time-box">
                    <span class="number" id="seconds">00</span>
                    <span class="label">Secs</span>
                </div>
            </div>

            <div class="location">
                <h3 class="location-name">Golden Plaza</h3>
                <p style="font-size: 0.9rem; color: #888;">Celebrate with us at our wedding venue</p>
                <a href="https://maps.app.goo.gl/AMYfMQbmzNiTB344A?g_st=ac" target="_blank" class="btn-maps">View on Map</a>
            </div>
        </section>
    </div>

    <footer>
        <p>Z & M • 2026</p>
    </footer>

    <script>
        // تحديد تاريخ الفرح
        const weddingDate = new Date("July 10, 2026 18:00:00").getTime();

        const updateCountdown = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            // حساب الأيام، الساعات، الدقائق والثواني
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // عرض الأرقام في الـ HTML
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // لو التايمر خلص (جه يوم الفرح)
            if (distance < 0) {
                clearInterval(updateCountdown);
                document.getElementById("countdown").innerHTML = "<h3 style='font-family: Playfair Display; color: #D4C4A8; margin-top: 20px;'>Today is the Big Day!</h3>";
            }
        }, 1000);
    </script>
</body>
</html>
