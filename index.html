<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyad & Mariam - Wedding Invitation</title>
    <!-- استدعاء خطوط أنيقة من جوجل -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات الألوان (أبيض، بيج، وأوف وايت) */
        :root {
            --bg-color: #FAF9F6; /* أوف وايت للخلفية */
            --white: #FFFFFF;    /* أبيض ناصع */
            --text-color: #4A4A4A; /* رمادي غامق جداً للقراءة */
            --accent-color: #C3B091; /* بيج أنيق */
            --dark-accent: #8E7C5E; /* بيج غامق للتباين */
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            scroll-behavior: smooth;
        }

        /* تأثير الورد في الخلفية والأركان */
        .hero, .details-section, .location-section {
            position: relative;
            overflow: hidden;
        }

        /* ورود مائية خفيفة في الخلفية العامة */
        .bg-floral-watermark {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.04; /* خفيفة جداً عشان متغطيش على الكلام */
            pointer-events: none;
            z-index: 0;
        }

        /* ورود أنيقة في الأركان */
        .corner-flower {
            position: absolute;
            width: 160px;
            height: 160px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; transform: scaleX(-1); }
        .bottom-left { bottom: 0; left: 0; transform: scaleY(-1); }
        .bottom-right { bottom: 0; right: 0; transform: scale(-1); }

        /* القسم الأول: الأسماء */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, var(--white), var(--bg-color));
            padding: 20px;
            animation: fadeIn 2s ease-in; /* حركة ظهور ناعمة */
        }

        .intro-text {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.9rem;
            color: var(--dark-accent);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .names {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            color: var(--text-color);
            line-height: 1.2;
            margin: 10px 0;
            position: relative;
            z-index: 1;
        }

        .and {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3rem;
            color: var(--accent-color);
            margin: 10px 0;
            position: relative;
            z-index: 1;
        }

        .divider {
            width: 60px;
            height: 2px;
            background-color: var(--accent-color);
            margin: 30px auto;
            position: relative;
            z-index: 1;
        }

        /* القسم الثاني: التاريخ والعداد */
        .details-section {
            padding: 80px 20px;
            background-color: var(--white);
        }

        .date {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .time-box {
            background-color: var(--bg-color);
            padding: 20px;
            border-radius: 8px;
            min-width: 90px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(195, 176, 145, 0.2);
        }

        .number {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--dark-accent);
            display: block;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-color);
            margin-top: 5px;
            display: block;
        }

        /* القسم الثالث: المكان وزر الخريطة */
        .location-section {
            padding: 80px 20px;
            background-color: var(--bg-color);
        }

        .venue {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .map-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 16px 45px;
            background-color: var(--accent-color);
            color: var(--white);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            border-radius: 30px; /* زرار بحواف دائرية أنيقة */
            transition: background 0.3s, transform 0.3s;
            box-shadow: 0 4px 15px rgba(195, 176, 145, 0.4);
            position: relative;
            z-index: 1;
        }

        .map-btn:hover {
            background-color: var(--dark-accent);
            transform: translateY(-3px); /* حركة خفيفة عند الوقوف على الزر */
        }

        footer {
            padding: 30px;
            background-color: var(--white);
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--dark-accent);
            position: relative;
            z-index: 1;
        }

        /* تأثير الظهور */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* توافق الموبايل */
        @media (max-width: 600px) {
            .names { font-size: 3rem; }
            .countdown-container { gap: 10px; }
            .time-box { padding: 15px; min-width: 70px; }
            .number { font-size: 2rem; }
            .label { font-size: 0.7rem; }
            .corner-flower { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

    <!-- القالب المشترك للنقشة الجمالية للورود (SVG عالي الجودة) -->
    <svg style="display: none;">
        <symbol id="flower-svg" viewBox="0 0 100 100">
            <path d="M10,90 Q30,70 50,50 T90,10 M50,50 Q60,35 55,20 Q40,25 50,50 M50,50 Q35,60 20,55 Q25,40 50,50 M30,70 Q25,85 15,80 Q20,65 30,70 M70,30 Q65,45 55,40 Q60,25 70,30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="50" cy="50" r="2" fill="currentColor"/>
        </symbol>
        <symbol id="pattern-flower" viewBox="0 0 100 100">
            <path d="M50,25 C55,10 70,10 65,25 C60,40 50,45 50,50 C50,45 40,40 35,25 C30,10 45,10 50,25 Z" fill="currentColor"/>
            <path d="M25,50 C10,55 10,70 25,65 C40,60 45,50 50,50 C45,50 40,40 25,35 C10,30 10,45 25,50 Z" fill="currentColor"/>
            <path d="M50,75 C45,90 30,90 35,75 C40,60 50,55 50,50 C50,55 60,60 65,75 C70,90 55,90 50,75 Z" fill="currentColor"/>
            <path d="M75,50 C90,45 90,30 75,35 C60,40 55,50 50,50 C55,50 60,60 75,65 C90,70 90,55 75,50 Z" fill="currentColor"/>
        </symbol>
    </svg>

    <!-- الافتتاحية -->
    <section class="hero">
        <!-- ورود الأركان -->
        <svg class="corner-flower top-left" style="color: var(--dark-accent);"><use href="#flower-svg"/></svg>
        <svg class="corner-flower top-right" style="color: var(--dark-accent);"><use href="#flower-svg"/></svg>
        
        <!-- خلفية مائية مكررة خفيفة -->
        <svg class="bg-floral-watermark" style="color: var(--accent-color); opacity: 0.02;">
            <pattern id="bg-pattern" width="100" height="100" patternUnits="userSpaceOnUse">
                <use href="#pattern-flower" x="10" y="10" width="30" height="30"/>
                <use href="#pattern-flower" x="60" y="50" width="30" height="30"/>
            </pattern>
            <rect width="100%" height="100%" fill="url(#bg-pattern)"/>
        </svg>

        <div class="intro-text">We are getting married</div>
        <div class="names">Zyad Nasser</div>
        <div class="and">&</div>
        <div class="names">Mariam Sherif</div>
        <div class="divider"></div>
        <p style="letter-spacing: 3px; font-weight: 300;">10 . 07 . 2026</p>
    </section>

    <!-- التفاصيل والعداد التنازلي -->
    <section class="details-section">
        <svg class="bg-floral-watermark" style="color: var(--accent-color); opacity: 0.03;"><use href="#pattern-flower" x="10%" y="20%" width="150" height="150"/><use href="#pattern-flower" x="75%" y="40%" width="120" height="120"/></svg>
        
        <h2 class="date">Save The Date</h2>
        <p style="letter-spacing: 2px; color: #8E7C5E;">FRIDAY, JULY 10, 2026</p>
        
        <div class="countdown-container">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs</span>
            </div>
        </div>
    </section>

    <!-- المكان وزر الخريطة -->
    <section class="location-section">
        <!-- ورود الأركان السفلية -->
        <svg class="corner-flower bottom-left" style="color: var(--dark-accent);"><use href="#flower-svg"/></svg>
        <svg class="corner-flower bottom-right" style="color: var(--dark-accent);"><use href="#flower-svg"/></svg>

        <div class="intro-text">Join Us At</div>
        <h2 class="venue">Golden Plaza</h2>
        <p>We can't wait to celebrate with you!</p>
        <!-- الزرار ده متبرمج يفتح اللينك اللي إنت بعته -->
        <a href="https://maps.app.goo.gl/AMYfMQbmzNiTB344A?g_st=ac" target="_blank" class="map-btn">
            Open in Google Maps
        </a>
    </section>

    <footer>
        Zyad & Mariam © 2026
    </footer>

    <!-- سكربت برمجة العداد -->
    <script>
        // تاريخ الفرح المظبوط على الساعة 8 مساءً
        const weddingDate = new Date("July 10, 2026 20:00:00").getTime();
        
        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            
            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            // إضافة صفر لو الرقم أقل من 10 (عشان الشكل يبقى أحلى)
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
