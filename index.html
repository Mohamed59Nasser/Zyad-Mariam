<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyad & Mariam - Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FAF9F6;
            --white: #FFFFFF;
            --text-color: #4A4A4A;
            --accent-color: #C3B091;
            --dark-accent: #8E7C5E;
            --rose-gold: #E6D7C3;
        }

        body, html {
            margin: 0; padding: 0; background-color: var(--bg-color);
            color: var(--text-color); font-family: 'Montserrat', sans-serif;
            text-align: center; overflow-x: hidden;
        }

        /* ورد الأركان */
        .corner-flowers { position: absolute; width: 120px; height: 120px; z-index: 1; pointer-events: none; }
        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; transform: scaleX(-1); }
        .bottom-left { bottom: 0; left: 0; transform: scaleY(-1); }
        .bottom-right { bottom: 0; right: 0; transform: scale(-1); }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: relative; }
        .wreath-container { width: 100%; max-width: 200px; margin-bottom: 20px; z-index: 2; }
        .names { font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--text-color); margin: 10px 0; z-index: 2; }
        .and { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2.5rem; color: var(--accent-color); margin: 5px 0; z-index: 2; }
        
        /* القلوب الطائرة */
        .floating-heart { position: fixed; bottom: -50px; z-index: 0; pointer-events: none; animation: floatUp linear infinite; }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-120vh) scale(1.2); opacity: 0; }
        }

        .details-section, .location-section { padding: 80px 20px; position: relative; z-index: 1; }
        .countdown-container { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .time-box { background: var(--white); padding: 15px; border-radius: 8px; min-width: 70px; border: 1px solid rgba(195, 176, 145, 0.2); }
        .number { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--dark-accent); display: block; }
        .map-btn { display: inline-block; margin-top: 30px; padding: 15px 40px; background-color: var(--accent-color); color: white; text-decoration: none; border-radius: 30px; transition: 0.3s; }
        .map-btn:hover { background-color: var(--dark-accent); }
    </style>
</head>
<body>

    <section class="hero">
        <svg class="corner-flowers top-left" viewBox="0 0 100 100"><path d="M0,0 Q30,10 40,40 T80,80" stroke="var(--accent-color)" fill="none" stroke-width="2"/></svg>
        <svg class="corner-flowers top-right" viewBox="0 0 100 100"><path d="M0,0 Q30,10 40,40 T80,80" stroke="var(--accent-color)" fill="none" stroke-width="2"/></svg>

        <div class="wreath-container">
            <svg viewBox="0 0 200 100"><circle cx="100" cy="50" r="20" fill="var(--accent-color)"/><circle cx="100" cy="50" r="12" fill="var(--rose-gold)"/></svg>
        </div>
        <div class="names">Zyad Nasser</div>
        <div class="and">&</div>
        <div class="names">Mariam Sherif</div>
        <p style="margin-top: 20px;">10 . 07 . 2026</p>
    </section>

    <section class="details-section">
        <h2>Save The Date</h2>
        <div class="countdown-container">
            <div class="time-box"><span class="number" id="days">00</span>Days</div>
            <div class="time-box"><span class="number" id="hours">00</span>Hrs</div>
            <div class="time-box"><span class="number" id="minutes">00</span>Mins</div>
            <div class="time-box"><span class="number" id="seconds">00</span>Secs</div>
        </div>
    </section>

    <section class="location-section">
        <h3>Golden Plaza</h3>
        <a href="#" class="map-btn">Open in Google Maps</a>
    </section>

    <script>
        // العداد
        const weddingDate = new Date("July 10, 2026 20:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const dist = weddingDate - now;
            document.getElementById("days").innerText = Math.floor(dist / (1000*60*60*24));
            document.getElementById("hours").innerText = Math.floor((dist % (1000*60*60*24)) / (1000*60*60));
            document.getElementById("minutes").innerText = Math.floor((dist % (1000*60*60)) / (1000*60));
            document.getElementById("seconds").innerText = Math.floor((dist % (1000*60)) / 1000);
        }, 1000);

        // القلوب الطائرة
        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = `<svg viewBox="0 0 100 100" width="30" height="30"><path d="M50,25 Q75,5 90,30 Q90,60 50,90 Q10,60 10,30 Q25,5 50,25 Z" fill="none" stroke="#C3B091" stroke-width="2"/><text x="50" y="55" font-size="25" text-anchor="middle" fill="#C3B091">${Math.random() > 0.5 ? 'Z' : 'M'}</text></svg>`;
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 5 + 7) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 12000);
        }, 1000);
    </script>
</body>
</html>
