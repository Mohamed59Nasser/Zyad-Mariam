<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wedding Invitation</title>
    <!-- خطوط رسمية للطباعة -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        @page { size: A5; margin: 0; }
        body { 
            margin: 0; padding: 0; background-color: #f0f0f0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Montserrat', sans-serif;
            -webkit-print-color-adjust: exact;
        }
        .card {
            width: 148mm; height: 210mm;
            background-color: #FAF9F6;
            position: relative; padding: 50px;
            box-sizing: border-box;
            border: 5px double #8E7C5E;
            text-align: center;
        }
        /* تصميم الورد كإطارات جانبية */
        .flower {
            position: absolute; width: 120px; color: #8E7C5E; opacity: 0.8;
        }
        .top-left { top: 30px; left: 30px; }
        .bottom-right { bottom: 30px; right: 30px; transform: rotate(180deg); }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: #8E7C5E; margin-bottom: 20px; }
        .names { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin: 50px 0; color: #333; line-height: 1.3; }
        .details { font-size: 1.2rem; line-height: 2; color: #555; }
    </style>
</head>
<body>

    <div class="card">
        <!-- رسومات ورد بسيطة وأنيقة -->
        <svg class="flower top-left" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/>
        </svg>
        <svg class="flower bottom-right" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/>
        </svg>

        <div style="margin-top: 60px;">
            <p style="text-transform: uppercase; letter-spacing: 3px;">We are cordially invited</p>
            <div class="names">
                Zyad Nasser<br>
                <span style="font-size: 1.8rem; font-style: italic;">&</span><br>
                Mariam Sherif
            </div>
            <div class="details">
                <p><strong>Golden Plaza</strong></p>
                <p>Friday, July 10th, 2026</p>
                <p style="font-size: 1.6rem; font-weight: bold; color: #8E7C5E;">8:00 PM</p>
                <br>
                <p style="font-style: italic;">We look forward to celebrating with you.</p>
            </div>
        </div>
    </div>

</body>
</html>
