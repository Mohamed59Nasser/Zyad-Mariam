<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyad & Mariam - Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FAF9F6; /* أوف وايت فخم للخلفية */
            --white: #FFFFFF;
            --text-color: #4A4A4A;
            --accent-color: #C3B091; /* ذهبي/بيج كلاسيكي */
            --dark-accent: #8E7C5E;
            --rose-gold: #E6D7C3;
        }

        body, html {
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            overflow-x: hidden; 
            scroll-behavior: smooth;
        }

        /* ورد الأركان الفخم (أعلى اليمين واليسار) */
        .corner-flowers { 
            position: absolute; 
            width: 160px; 
            height: 160px; 
            z-index: 1; 
            pointer-events: none; 
            opacity: 0.8;
        }
        .top-left { top: 10px; left: 10px; }
        .top-right { top: 10px; right: 10px; transform: scaleX(-1); }

        /* الهيرو (الواجهة الرئيسية) */
        .hero { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            position: relative; 
        }

        /* طوق الورد المركزي الجديد - مرسوم بروقان */
        .wreath-container { 
            width: 100%; 
            max-width: 180px; 
            margin-bottom: 25px; 
            z-index: 2; 
        }

        .intro-text { 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 0.85rem; 
            color: var(--dark-accent); 
            margin-bottom: 15px; 
            z-index: 2; 
        }
        
        .names { 
            font-family: 'Playfair Display', serif; 
            font-size: 4.2rem; 
            color: var(--text-color); 
            margin: 5px 0; 
            z-index: 2; 
            line-height: 1.2;
        }
        
        .and { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 2.8rem; 
            color: var(--accent-color); 
            margin: 5px 0; 
            z-index: 2; 
        }
        
        .divider { 
            width: 80px; 
            height: 1px; 
            background-color: var(--accent-color); 
            margin: 25px auto; 
            z-index: 2; 
        }

        .main-date {
            letter-spacing: 4px; 
            font-weight: 300;
            font-size: 1.1rem;
            color: var(--dark-accent);
            margin: 0;
            z-index: 2;
        }
        
        /* تأثير القلوب الطائرة اللي طلبتها بالظبط */
        .floating-heart { 
            position: fixed; 
            bottom: -50px; 
            z-index: 0; 
            pointer-events: none; 
            animation: floatUp linear infinite; 
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 0.35; }
            80% { opacity: 0.35; }
            100% { transform: translateY(-120vh) scale(1.2); opacity: 0; }
        }

        /* باقي أقسام الصفحة (التفاصيل والمكان) */
        .details-section, .location-section { 
            padding: 80px 20px; 
            position: relative; 
            z-index: 1; 
        }
        
        .section-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.5rem; 
            color: var(--text-color); 
            margin-bottom: 10px;
        }

        .countdown-container { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin: 40px 0; 
        }
        
        .time-box { 
            background: var(--white); 
            padding: 15px 20px; 
            border-radius: 8px; 
            min-width: 75px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(195, 176, 145, 0.2); 
        }
        
        .number { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.2rem; 
            color: var(--dark-accent); 
            display: block; 
        }
        
        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        .map-btn { 
            display: inline-block; 
            margin-top: 25px; 
            padding: 15px 40px; 
            background-color: var(--accent-color); 
            color: white; 
            text-decoration: none; 
            border-radius: 30px; 
            letter-spacing: 2px;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(195, 176, 145, 0.3);
            transition: 0.3s ease;
        }
        .map-btn:hover { background-color: var(--dark-accent); transform: translateY(-2px); }

        footer {
            padding: 40px 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #aaa;
            text-transform: uppercase;
        }

        /* ريسبرونسيف للموبايل عشان مفيش حاجة تضرب */
        @media (max-width: 600px) {
            .names { font-size: 3rem; }
            .and { font-size: 2.2rem; }
            .corner-flowers { width: 100px; height: 100px; }
            .time-box { min-width: 55px; padding: 10px; }
            .number { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <svg class="corner-flowers top-left" viewBox="0 0 100 100" fill="none" stroke="var(--accent-color)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M0,0 C20,10 40,15 50,35 C55,45 45,60 35,55 C20,50 30,30 15,25 C5,20 0,0 0,0 Z"/>
            <path d="M25,10 C35,20 45,15 50,5 M10,25 C20,35 15,45 5,50"/>
            <circle cx="35" cy="35" r="3" fill="var(--accent-color)"/>
            <circle cx="45" cy="25" r="2" fill="var(--accent-color)"/>
        </svg>
        <svg class="corner-flowers top-right" viewBox="0 0 100 100" fill="none" stroke="var(--accent-color)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M0,0 C20,10 40,15 50,35 C55,45 45,60 35,55 C20,50 30,30 15,25 C5,20 0,0 0,0 Z"/>
            <path d="M25,10 C35,20 45,15 50,5 M10,25 C20,35 15,45 5,50"/>
            <circle cx="35" cy="35" r="3" fill="var(--accent-color)"/>
            <circle cx="45" cy="25" r="2" fill="var(--accent-color)"/>
        </svg>

        <div class="wreath-container">
            <svg viewBox="0 0 100 100" fill="none" stroke="var(--accent-color)" stroke-width="1.2">
                <circle cx="50" cy="50" r="35" stroke-dasharray="4 4" opacity="0.5"/>
                <path d="M15,50 C15,30 30,15 50,15 C70,15 85,30 85,50 C85,70 70,85 50,85 C30,85 15,70 15,50 Z"/>
                <path d="M25,30 Q20,25 28,22 Q32,28 25,30 Z" fill="var(--accent-color)"/>
                <path d="M75,30 Q80,25 72,22 Q68,28 75,30 Z" fill="var(--accent-color)"/>
                <path d="M50,15 Q50,5 55,8 Q52,18 50,15 Z" fill="var(--accent-color)"/>
                <path d="M50,85 Q50,95 45,92 Q48,82 50,85 Z" fill="var(--accent-color)"/>
            </svg>
        </div>

        <div class="intro-text">We are getting married</div>
        <div class="names">Zyad Nasser</div>
        <div class="and">&</div>
        <div class="names">Mariam Sherif</div>
        <div class="divider"></div>
        <p class="main-date">10 . 07 . 2026</p>
    </section>

    <section class="details-section">
        <h2 class="section-title">Save The Date</h2>
        <p style="letter-spacing: 2px; color: var(--dark-accent); font-weight: 500; font-size: 0.9rem;">FRIDAY, JULY 10, 2026</p>
        
        <div class="countdown-container">
            <div class="time-box"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-box"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
            <div class="time-box"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
            <div class="time-box"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
        </div>
    </section>

    <section class="location-section">
        <div class="intro-text">Wedding Venue</div>
        <h2 class="section-title" style="font-size: 2.2rem;">Golden Plaza</h2>
        <p style="max-width: 400px; margin: 0 auto; color: #666; font-size: 0.9rem; line-height: 1.6;">بانتظاركم تشرفونا وتشاركونا فرحتنا في ليلتنا الكبيرة!</p>
        <a href="https://maps.google.com" target="_blank" class="map-btn">Open in Google Maps</a>
    </section>

    <footer>
        Zyad & Mariam — 2026
    </footer>

    <script>
        // العداد التنازلي لتاريخ الفرح
        const weddingDate = new Date("July 10, 2026 20:00:00").getTime();
        
        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            
            if (distance < 0) {
                clearInterval(timer);
                return;
            }
            
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);

        // القلوب الطائرة وعليها الحروف العشوائية Z و M
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            
            const leftPosition = Math.random() * 100;
            const animationDuration = Math.random() * 5 + 7;
            const heartSize = Math.random() * 15 + 25;
            
            const letters = ['Z', 'M'];
            const letter = letters[Math.floor(Math.random() * letters.length)];

            heart.style.left = leftPosition + 'vw';
            heart.style.animationDuration = animationDuration + 's';
            
            heart.innerHTML = `
                <svg viewBox="0 0 100 100" width="${heartSize}" height="${heartSize}">
                   <path d="M50,25 Q75,5 90,30 Q90,60 50,90 Q10,60 10,30 Q25,5 50,25 Z" fill="none" stroke="#C3B091" stroke-width="2"/>
                   <text x="50" y="55" font-family="'Playfair Display', serif" font-size="25" text-anchor="middle" fill="#C3B091">${letter}</text>
                </svg>
            `;
            
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, animationDuration * 1000);
        }

        setInterval(createFloatingHeart, 1000);
    </script>
</body>
</html>
