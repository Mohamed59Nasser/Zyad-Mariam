<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyad & Mariam - Wedding Invitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FAF9F6;
            --white: #FFFFFF;
            --text-color: #4A4A4A;
            --accent-color: #C3B091;
            --dark-accent: #8E7C5E;
            --rose-gold: #E6D7C3;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* Real Flowers Styling */
        .real-flower {
            width: 160px;
            margin-bottom: 20px;
            mix-blend-mode: multiply; /* Blends the white background of the image with the site */
            z-index: 2;
            position: relative;
        }

        .corner-flower {
            position: absolute;
            width: 140px;
            mix-blend-mode: multiply;
            z-index: 1;
            opacity: 0.85;
        }

        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; transform: scaleX(-1); }
        .bottom-left { bottom: 0; left: 0; transform: scaleY(-1); }
        .bottom-right { bottom: 0; right: 0; transform: scale(-1); }

        /* Hero Section */
        .hero { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(to bottom, var(--white), var(--bg-color)); 
            padding: 20px; 
            position: relative; 
            animation: fadeIn 2s ease-in; 
        }

        .intro-text { text-transform: uppercase; letter-spacing: 4px; font-size: 0.9rem; color: var(--dark-accent); margin-bottom: 20px; position: relative; z-index: 2; }
        .names { font-family: 'Playfair Display', serif; font-size: 4.5rem; color: var(--text-color); line-height: 1.2; margin: 10px 0; position: relative; z-index: 2; }
        .and { font-family: 'Playfair Display', serif; font-style: italic; font-size: 3rem; color: var(--accent-color); margin: 10px 0; position: relative; z-index: 2; }
        .divider { width: 60px; height: 2px; background-color: var(--accent-color); margin: 30px auto; position: relative; z-index: 2; }
        .main-date { letter-spacing: 3px; font-weight: 300; position: relative; z-index: 2; }

        /* Floating Hearts */
        .floating-heart {
            position: fixed;
            bottom: -50px;
            z-index: 0;
            pointer-events: none;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-120vh) scale(1.2); opacity: 0; }
        }

        /* Details & Location Sections */
        .details-section, .location-section { padding: 80px 20px; position: relative; z-index: 1; }
        .date { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 10px; }
        .countdown-container { display: flex; justify-content: center; gap: 20px; margin: 40px 0; flex-wrap: wrap; }
        .time-box { background-color: var(--white); padding: 20px; border-radius: 8px; min-width: 90px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid rgba(195, 176, 145, 0.2); }
        .number { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--dark-accent); display: block; }
        .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-color); margin-top: 5px; display: block; }
        .venue { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; }
        
        .map-btn { display: inline-block; margin-top: 30px; padding: 16px 45px; background-color: var(--accent-color); color: var(--white); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; font-weight: 500; border-radius: 30px; transition: background 0.3s, transform 0.3s; box-shadow: 0 4px 15px rgba(195, 176, 145, 0.4); }
        .map-btn:hover { background-color: var(--dark-accent); transform: translateY(-3px); }
        footer { padding: 30px; background-color: var(--white); font-size: 0.8rem; letter-spacing: 2px; color: var(--dark-accent); position: relative; z-index: 2; }

        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .names { font-size: 3rem; }
            .countdown-container { gap: 10px; }
            .time-box { padding: 15px; min-width: 70px; }
            .number { font-size: 2rem; }
            .label { font-size: 0.7rem; }
            .corner-flower { width: 100px; }
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        
        <!-- Real Corner Roses -->
        <img src="https://images.unsplash.com/photo-1572454591674-2739f30d8c40?auto=format&fit=crop&w=400&q=80" alt="Rose Corner" class="corner-flower top-left">
        <img src="https://images.unsplash.com/photo-1572454591674-2739f30d8c40?auto=format&fit=crop&w=400&q=80" alt="Rose Corner" class="corner-flower top-right">

        <!-- Real Center Rose -->
        <img src="https://images.unsplash.com/photo-1578241561880-0a1d5ce3cb10?auto=format&fit=crop&w=400&q=80" alt="Vintage Rose" class="real-flower">

        <div class="intro-text">We are getting married</div>
        <div class="names">Zyad Nasser</div>
        <div class="and">&</div>
        <div class="names">Mariam Sherif</div>
        <div class="divider"></div>
        <p class="main-date">10 . 07 . 2026</p>
    </section>

    <!-- Details Section -->
    <section class="details-section">
        <h2 class="date">Save The Date</h2>
        <p style="letter-spacing: 2px; color: #8E7C5E; font-weight: 500;">FRIDAY, JULY 10, 2026 AT 8:00 PM</p>
        
        <div class="countdown-container">
            <div class="time-box"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-box"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
            <div class="time-box"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
            <div class="time-box"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
        </div>
    </section>

    <!-- Location Section -->
    <section class="location-section">
        
        <!-- Real Corner Roses for Bottom -->
        <img src="https://images.unsplash.com/photo-1572454591674-2739f30d8c40?auto=format&fit=crop&w=400&q=80" alt="Rose Corner" class="corner-flower bottom-left">
        <img src="https://images.unsplash.com/photo-1572454591674-2739f30d8c40?auto=format&fit=crop&w=400&q=80" alt="Rose Corner" class="corner-flower bottom-right">

        <div class="intro-text">Join Us At</div>
        <h2 class="venue">Golden Plaza</h2>
        <p>We can't wait to celebrate with you!</p>
        <a href="https://maps.app.goo.gl/AMYfMQbmzNiTB344A?g_st=ac" target="_blank" class="map-btn">
            Open in Google Maps
        </a>
    </section>

    <footer>
        Zyad & Mariam © 2026
    </footer>

    <!-- Countdown & Floating Hearts Script -->
    <script>
        // 1. Countdown Logic
        const weddingDate = new Date("July 10, 2026 20:00:00").getTime();
        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            
            if (distance < 0) {
                clearInterval(timer);
                return;
            }
            
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);

        // 2. Floating Hearts Logic
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            
            const leftPosition = Math.random() * 100; 
            const animationDuration = Math.random() * 5 + 7; 
            const heartSize = Math.random() * 20 + 30; 
            
            const letters = ['Z', 'M'];
            const letter = letters[Math.floor(Math.random() * letters.length)];

            heart.style.left = leftPosition + 'vw';
            heart.style.animationDuration = animationDuration + 's';
            
            heart.innerHTML = `
                <svg viewBox="0 0 100 100" width="${heartSize}" height="${heartSize}">
                   <path d="M50,25 Q75,5 90,30 Q90,60 50,90 Q10,60 10,30 Q25,5 50,25 Z" fill="none" stroke="#C3B091" stroke-width="2"/>
                   <text x="50" y="55" font-family="'Playfair Display', serif" font-size="25" text-anchor="middle" fill="#C3B091">${letter}</text>
                </svg>
            `;
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, animationDuration * 1000);
        }

        setInterval(createFloatingHeart, 1000);
    </script>
</body>
</html>
